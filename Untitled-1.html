<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
      table {
        margin: 0 auto;
        border-top: 3px solid #0339A6;
        border-bottom: 3px solid #0339A6;       
        text-align: left;
        border-collapse: collapse;
        margin-bottom: 20px;
      }
      td {
        border-top: 2px solid #A6ABAB;
        padding: 10px;
      }
      tr td:nth-child(3), td:nth-child(4) {
        text-align: right;
      }
      tr:nth-child(1), tr:nth-last-child(1) {
        background-color: #d3d3d3;
      }
  </style>
</head>
<body>
  <table>
    <tbody>
      <tr>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>NGN</td>
        <td>NGN</td>
      </tr>
      <tr>
        <td>Gross Income</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>40000</td>
      </tr>
      <tr>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td>Less Relief</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td rowspan="2">Consolidated relief allowance</td>
        <td scope="row">Higher of NGN 200,000 or 1% of GI</td>
        <td>200000</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td scope="row">20% of GI</td>
        <td>800000</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td>Pension</td>
        <td>8% of GI</td>
        <td>250000</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td>NHIS</td>
        <td>5% of GI</td>
        <td>25000</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td>NHF</td>
        <td>2.5% of GI</td>
        <td>2500</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td>Total</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>1500000</td>
      </tr>
      <tr>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <td>Taxable Income</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>2500000</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
